{% extends "base.html" %}

{% block content %}
<h2>Editar Equipo</h2>

<form method="POST">

    <label>Nombre:</label><br>
    <input type="text" name="nombre" value="{{ equipo[1] }}" required><br><br>

    <label>Estado:</label><br>
    <input type="text" name="estado" value="{{ equipo[2] }}" required><br><br>

    <label>Disponibilidad:</label><br>
    <input type="text" name="disponibilidad" value="{{ equipo[3] }}" required><br><br>

    <button type="submit">Actualizar</button>
</form>

{% endblock %}
